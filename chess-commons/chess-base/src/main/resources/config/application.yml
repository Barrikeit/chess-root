barrikeit:
  application:
    title: ajedrezillo
    name: ajedrezillo
    description: chess server
    version: v1
    timeZone: Europe/Madrid
spring:
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  profiles:
    active: @spring.profiles.active@
  config:
    import:
      - application-base.yml
      - application-@spring.profiles.active@.yml
  application.name: ajedrezillo
  mvc.servlet.path: /chess/v1
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

springdoc:
  api-docs.path: /chess/api-docs
  packagesToScan: org.barrikeit
  show-actuator: false
  swagger-ui:
    display-request-duration: true
    filter: true
    operations-sorter: method
    path: /chess/swagger-ui
    use-root-path: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

feign:
  autoconfiguration:
    jackson:
      enabled : true
